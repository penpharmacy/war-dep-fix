<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>เครื่องคำนวณการให้ยา Warfarin ห้องยาโรงพยาบาลพุนพิน</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* --- COPY PROTECTION STYLES --- */
body {
    user-select: none;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    background:linear-gradient(180deg,var(--bg),#FFFFFF);
    margin:0;
    padding:20px;
    color:#263238;
}

:root{
    --bg:#F0F8FF; 
    --card:#FFFFFF;
    --accent:#00A896;
    --accent-light:#CCEEEA;
    --muted:#5A6A70;
    --highlight:#75C2B9;
    --plan-bg-1: #F8FFFF;
    --plan-bg-2: #FFFBF8;
    --plan-bg-3: #FAF8FF;
    --plan-border-1: #40B2D6;
    --plan-border-2: #FFAD60;
    --plan-border-3: #AA8CFF;
    --main-pink: #E91E63;
    --light-pink: #FDE8F1;
    --accent-green: #4CAF50;
    font-family: 'Kanit', sans-serif;
}

header{display:flex;align-items:center;gap:12px}
h1{margin:0;font-size:20px;text-align:center;flex:1;color:var(--accent)}
.container{max-width:980px;margin:20px auto}
.card{background:var(--card);border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,0.08);padding:18px;margin-bottom:16px;border-top:4px solid var(--highlight)}
label{display:block;font-size:14px;margin-bottom:6px;color:var(--muted)}
input[type=number]{width:100%;padding:10px;border-radius:10px;border:1px solid #cfd8dc;font-size:16px;background:#FAFAFA;}
.row{display:flex;gap:12px}
.col{flex:1}
.radio-row{display:flex;gap:10px;flex-wrap:wrap}
.pill{padding:8px 14px;border-radius:20px;border:1px solid #B2DFDB;background:#E0F2F1;cursor:pointer;transition:all 0.2s ease; display: flex; align-items: center; gap: 5px;}
.pill:hover{background:var(--highlight);color:#004D40}
button.primary{background:var(--accent);color:#fff;border:0;padding:12px 20px;border-radius:12px;font-weight:600;cursor:pointer;transition:all 0.2s ease}
button.primary:hover{background:#008F85}
.result{margin-top:12px}
table{width:100%;border-collapse:collapse;border-radius:10px;overflow:hidden; table-layout: fixed; }
th,td{padding:8px;border-bottom:1px solid #E0F2F1;text-align:center; font-size: 14px;}
th{background:var(--accent-light);color:#004D40}

.plan-section { padding: 15px; margin-top: 15px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.plan-section.plan-0 { background-color: var(--plan-bg-1); border-left: 5px solid var(--plan-border-1);}
.plan-grid { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 8px; }
.day-card { min-width: 100px; flex: 1; text-align: center; padding: 10px 5px; border-radius: 12px; border: 1px solid #E0E0E0; background-color: #FFFFFF; }
.day-name { font-weight: 600; padding: 2px 0; margin-bottom: 4px; border-radius: 8px; color: #333; }
.day-name.mon { background-color: #FFECC6; } .day-name.tue { background-color: #E6E1F4; }
.day-name.wed { background-color: #E6F7E6; } .day-name.thu { background-color: #FEEED7; }
.day-name.fri { background-color: #E1F1FD; } .day-name.sat { background-color: #FDE8F1; }
.day-name.sun { background-color: #FCE6E6; }

.pill-icon { width: 20px; height: 20px; border-radius: 50%; display: inline-block; margin: 2px; }
.pill-icon-3mg { background-color: #4FC3F7; border: 1px solid #0288D1; }
.pill-icon-2mg { background-color: #FFB74D; border: 1px solid #F57C00; }
.half-pill { clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%); }

/* --- Standalone Calculator Styles --- */
.standalone-calculator { max-width: 980px; margin: 20px auto; padding: 18px; background: var(--card); border-radius: 16px; box-shadow: 0 4px 14px rgba(0,0,0,0.08); border-top: 4px solid var(--main-pink); }
.calculator-header-new { font-size: 18px; font-weight: 600; color: var(--main-pink); text-align: center; margin-bottom: 15px; }
.dosing-comparison-container { display: flex; gap: 12px; flex-wrap: wrap; }
.pill-dosing-container { flex: 1; min-width: 250px; }
.dose-input-group { padding: 10px; border-radius: 8px; margin-bottom: 10px; }
#dose2mgContainer { background: #FFFBF8; border: 1px solid #FFAD60; }
#dose3mgContainer { background: #F8FFFF; border: 1px solid #40B2D6; }
.dose-input-row { display: flex; align-items: center; gap: 5px; margin-top: 5px; }
.dose-input-row input { width: 50px; text-align: center; padding: 4px; }
.comparison-section { flex: 1.2; min-width: 300px; padding: 15px; border: 1px solid #cfd8dc; border-radius: 8px; }
.comparison-output { margin-top: 15px; padding: 15px; border-left: 5px solid var(--accent-green); background: #F0FFF0; border-radius: 8px; }

@media(max-width:720px){ .row, .dosing-comparison-container {flex-direction:column} .day-card { min-width: 80px; } }
</style>
</head>
<body oncontextmenu="return false;">

<div class="container">
    <header class="card">
        <h1>เครื่องคำนวณการให้ยา Warfarin โรงพยาบาลพุนพิน</h1>
    </header>

    <section class="card">
        <form id="mainForm">
            <div class="row">
                <div class="col">
                    <label>INR ปัจจุบัน</label>
                    <input type="number" step="0.01" id="inr" value="2.5">
                </div>
                <div class="col">
                    <label>ขนาดยาเดิม (mg/สัปดาห์)</label>
                    <input type="number" step="0.1" id="weeklyDose" placeholder="เช่น 21">
                </div>
                <div class="col">
                    <label>จำนวนวันนัด (วัน)</label>
                    <input type="number" id="days" value="28">
                </div>
            </div>

            <div style="margin-top:15px">
                <label>ชนิดเม็ดยาที่ใช้</label>
                <div class="radio-row">
                    <label class="pill"><input type="radio" name="pills" value="3" checked> เม็ด 3 mg</label>
                    <label class="pill"><input type="radio" name="pills" value="2"> เม็ด 2 mg</label>
                    <label class="pill"><input type="radio" name="pills" value="3mg_fixed"> 3 mg (ไม่แบ่งเม็ด)</label>
                    <label class="pill"><input type="radio" name="pills" value="2mg_fixed"> 2 mg (ไม่แบ่งเม็ด)</label>
                </div>
            </div>
            
            <div style="margin-top:20px; text-align:center">
                <button type="button" onclick="calculatePlan()" class="primary">คำนวณแผนการกินยา</button>
            </div>
        </form>
    </section>

    <div id="plans" style="display:none"></div>

    <!-- Standalone Calculator -->
    <div class="standalone-calculator">
        <div class="calculator-header-new">เครื่องคำนวณปริมาณ mg รวมจากเม็ดยา</div>
        <div class="dosing-comparison-container">
            <div class="pill-dosing-container">
                <div id="dose2mgContainer" class="dose-input-group">
                    <div style="font-weight:600; color:#FFAD60">Warfarin 2 mg (สีส้ม)</div>
                    <div class="dose-input-row" data-mg="2">
                        <input type="number" step="0.5" class="pill-count" placeholder="เม็ด" oninput="calculateManual()">
                        <span>×</span>
                        <input type="number" class="day-count" placeholder="วัน" oninput="calculateManual()">
                    </div>
                    <button class="primary" style="font-size:12px; padding:5px; margin-top:5px; width:100%" onclick="addRow(2)">+ เพิ่มรายการ</button>
                </div>
                <div id="dose3mgContainer" class="dose-input-group">
                    <div style="font-weight:600; color:#40B2D6">Warfarin 3 mg (สีฟ้า)</div>
                    <div class="dose-input-row" data-mg="3">
                        <input type="number" step="0.5" class="pill-count" placeholder="เม็ด" oninput="calculateManual()">
                        <span>×</span>
                        <input type="number" class="day-count" placeholder="วัน" oninput="calculateManual()">
                    </div>
                    <button class="primary" style="font-size:12px; padding:5px; margin-top:5px; width:100%" onclick="addRow(3)">+ เพิ่มรายการ</button>
                </div>
            </div>

            <div class="comparison-section">
                <label>เปรียบเทียบกับ Dose เดิม (mg/wk)</label>
                <input type="number" id="manualOldDose" oninput="calculateManual()">
                <label style="margin-top:10px">จำนวนวันนัดที่จ่าย</label>
                <input type="number" id="manualDays" value="7" oninput="calculateManual()">
                
                <div id="manualResult" class="comparison-output" style="display:none"></div>
            </div>
        </div>
    </div>

    <footer class="card" style="font-size:12px; text-align:center; color:var(--muted)">
        เครื่องมือนี้เป็นตัวช่วยคำนวณเบื้องต้น การตัดสินใจขั้นสุดท้ายขึ้นอยู่กับดุลยพินิจของแพทย์และเภสัชกร
    </footer>
</div>

<script>
// --- Global Logic ---
function addRow(mg) {
    const container = document.getElementById(`dose${mg}mgContainer`);
    const div = document.createElement('div');
    div.className = 'dose-input-row';
    div.setAttribute('data-mg', mg);
    div.innerHTML = `<input type="number" step="0.5" class="pill-count" oninput="calculateManual()"> <span>×</span> <input type="number" class="day-count" oninput="calculateManual()"> <button onclick="this.parentElement.remove();calculateManual()" style="border:none; background:none; color:red; cursor:pointer">×</button>`;
    container.insertBefore(div, container.lastElementChild);
}

function calculateManual() {
    const rows = document.querySelectorAll('.standalone-calculator .dose-input-row');
    let totalMg = 0;
    let count2 = 0;
    let count3 = 0;

    rows.forEach(row => {
        const mg = parseFloat(row.getAttribute('data-mg'));
        const p = parseFloat(row.querySelector('.pill-count').value) || 0;
        const d = parseFloat(row.querySelector('.day-count').value) || 0;
        totalMg += (p * mg * d);
        if(mg === 2) count2 += (p * d);
        if(mg === 3) count3 += (p * d);
    });

    const oldDose = parseFloat(document.getElementById('manualOldDose').value) || 0;
    const days = parseInt(document.getElementById('manualDays').value) || 7;
    const diff = oldDose > 0 ? ((totalMg - oldDose)/oldDose*100).toFixed(1) : 0;

    const resultDiv = document.getElementById('manualResult');
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = `
        <b>ผลลัพธ์:</b><br>
        รวม: ${totalMg.toFixed(2)} mg/สัปดาห์ (เฉลี่ย ${(totalMg/7).toFixed(2)} mg/วัน)<br>
        เทียบ Dose เดิม: ${diff}%<br>
        <hr>
        <b>จำนวนที่ต้องจ่าย (${days} วัน):</b><br>
        เม็ด 2 mg: ${Math.ceil(count2 * days/7)} เม็ด<br>
        เม็ด 3 mg: ${Math.ceil(count3 * days/7)} เม็ด
    `;
}

function calculatePlan() {
    const inr = parseFloat(document.getElementById('inr').value);
    const weeklyDose = parseFloat(document.getElementById('weeklyDose').value);
    const pillType = document.querySelector('input[name="pills"]:checked').value;
    const apptDays = parseInt(document.getElementById('days').value);

    if(!weeklyDose) { alert('กรุณาระบุขนาดยาเดิม'); return; }

    let factor = 1.0;
    if (inr < 1.5) factor = 1.15;
    else if (inr < 2.0) factor = 1.07;
    else if (inr > 3.0 && inr <= 3.9) factor = 0.93;
    else if (inr >= 4.0) factor = 0.90;

    const targetWeekly = weeklyDose * factor;
    const planDiv = document.getElementById('plans');
    planDiv.innerHTML = '';
    planDiv.style.display = 'block';

    // Simple Distribution Logic
    let dailyMgs = [];
    let pillMg = (pillType.includes('3')) ? 3 : 2;
    let isFixed = pillType.includes('fixed');

    for(let i=0; i<7; i++) {
        let dayDose = targetWeekly / 7;
        if(isFixed) {
            dailyMgs.push(Math.round(dayDose / pillMg) * pillMg);
        } else {
            dailyMgs.push(Math.round(dayDose * 2 / pillMg) * pillMg / 2);
        }
    }

    const dayNames = ['จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์','อาทิตย์'];
    const dayClasses = ['mon','tue','wed','thu','fri','sat','sun'];

    let html = `<div class="plan-section plan-0">
        <h3>แผนการรับประทานยาที่แนะนำ (เป้าหมาย: ${targetWeekly.toFixed(2)} mg/wk)</h3>
        <div class="plan-grid">`;
    
    let total3 = 0, total2 = 0;
    dailyMgs.forEach((mg, i) => {
        let pills = mg / pillMg;
        if(pillMg === 3) total3 += pills; else total2 += pills;
        
        let pillIcons = '';
        for(let j=0; j<Math.floor(pills); j++) pillIcons += `<span class="pill-icon pill-icon-${pillMg}mg"></span>`;
        if(pills % 1 !== 0) pillIcons += `<span class="pill-icon pill-icon-${pillMg}mg half-pill"></span>`;

        html += `<div class="day-card">
            <div class="day-name ${dayClasses[i]}">${dayNames[i]}</div>
            <div style="font-weight:600">${mg} mg</div>
            <div>${pillIcons}</div>
            <div style="font-size:11px">${pills} เม็ด (${pillMg}mg)</div>
        </div>`;
    });

    html += `</div>
        <p><b>สรุปจำนวนยาที่ต้องจ่าย (${apptDays} วัน):</b> 
        ${pillMg === 3 ? 'เม็ด 3 mg: ' + Math.ceil(total3 * apptDays/7) : 'เม็ด 2 mg: ' + Math.ceil(total2 * apptDays/7)} เม็ด</p>
    </div>`;

    planDiv.innerHTML = html;
}
</script>
</body>
</html>
